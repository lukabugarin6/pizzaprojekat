services:
  webfront:
    build:
      context: ./webfront
      dockerfile: Dockerfile
      # ako ti treba build-time za NEXT_PUBLIC_*:
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    env_file:
      - ./webfront/.env
    depends_on:
      - backend

  webfront_stage:
    build:
      context: ./webfront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
    env_file:
      - ./webfront/.env.stage
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4000:3000"
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./db/.env
    volumes:
      - db_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pROOT_PASS_CHANGE_ME"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  db_data:
