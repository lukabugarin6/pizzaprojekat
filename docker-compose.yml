services:
  webfront:
    build:
      context: ./webfront
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  webfront_stage:
    build:
      context: ./webfront
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pizzaprojekat
      MYSQL_USER: pizzouser
      MYSQL_PASSWORD: PIZZA_PASS_CHANGE_ME
      MYSQL_ROOT_PASSWORD: ROOT_PASS_CHANGE_ME
    volumes:
      - db_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    # (opciono) ako hoćeš da se kačiš sa hosta:
    # ports:
    #   - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pROOT_PASS_CHANGE_ME"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=pizzaprojekat
      - DB_USER=pizzouser
      - DB_PASS=PIZZA_PASS_CHANGE_ME
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: